# Oddventure 로컬 개발 환경 Docker Compose 설정
# MySQL 8.0과 Redis 8.2.1을 컨테이너로 실행

services:
  # MySQL 데이터베이스 서비스
  mysql:
    image: mysql:8.0  # MySQL 8.0 공식 이미지 사용
    container_name: oddventure-mysql  # 컨테이너 이름 지정
    restart: unless-stopped  # 컨테이너 자동 재시작 (수동으로 중지한 경우 제외)

    # 환경변수 설정 (.env 파일에서 값 로드)
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}  # root 사용자 비밀번호
      MYSQL_DATABASE: ${MYSQL_DATABASE}  # 자동 생성할 데이터베이스 이름
      MYSQL_USER: ${MYSQL_USER}  # 추가 사용자 계정
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}  # 추가 사용자 비밀번호
      TZ: Asia/Seoul  # 타임존 설정
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}

    # 포트 매핑 (호스트:컨테이너)
    ports:
      - "3306:3306"  # MySQL 기본 포트

    # 데이터 영속성을 위한 볼륨 마운트
    volumes:
      - mysql_data:/var/lib/mysql  # MySQL 데이터 디렉토리

    # MySQL 서버 시작 옵션
    command:
      - --character-set-server=utf8mb4  # UTF-8 문자셋 사용
      - --collation-server=utf8mb4_unicode_ci  # 정렬 규칙 설정
      - --skip-name-resolve  # 호스트명 DNS 조회 비활성화 (성능 향상)

    # 헬스체크 설정 (컨테이너 상태 모니터링)
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u${MYSQL_USER}", "-p${MYSQL_PASSWORD}" ]
      interval: 10s  # 10초마다 체크
      timeout: 5s  # 5초 타임아웃
      retries: 5  # 5회 실패 시 unhealthy 상태로 전환

    # 네트워크 설정
    networks:
      - oddventure-network

  # Redis 캐시 서비스
  redis:
    image: redis:8.2.1  # Redis 8.2.1 공식 이미지 사용
    container_name: oddventure-redis  # 컨테이너 이름 지정
    restart: unless-stopped  # 컨테이너 자동 재시작

    # 포트 매핑 (호스트:컨테이너)
    ports:
      - "6379:6379"  # Redis 기본 포트

    # 데이터 영속성을 위한 볼륨 마운트
    volumes:
      - redis_data:/data  # Redis 데이터 디렉토리

    # Redis 서버 시작 옵션 (AOF 영속성 활성화)
    command: redis-server --appendonly yes

    # 헬스체크 설정
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]  # PING 명령으로 응답 확인
      interval: 10s
      timeout: 5s
      retries: 5

    # 네트워크 설정
    networks:
      - oddventure-network

  # RabbitMQ 지연 처리 서비스
  rabbitmq:
    image: rabbitmq:4-management
    container_name: oddventure-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672" # GUI 웹 접속용 포트
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - oddventure-network

  # Elsticsearch 검색 엔진
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.10.2
    container_name: oddventure-elasticsearch
    restart: unless-stopped

    environment:
      - discovery.type=single-node # 단일 노드로 클러스터 구성(개발 환경)
      - xpack.security.enabled=false # 보안 기능 비활성화
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m" # JVM 메모리 설정
      - bootstrap.memory_lock=true # 스왑 방지를 위해 메모리를 물리 메모리에 고정

    ports:
      - "9200:9200"

    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data

    ulimits:
      # memlock (메모리 락)
      # bootstrap.memory_lock=true 설정을 위해 필요
      # -1: 무제한 (메모리를 스왑으로 이동하지 않음)
      memlock:
        soft: -1  # 소프트 제한 (경고 수준)
        hard: -1  # 하드 제한 (강제 제한)

      # nofile (파일 디스크립터)
      # Elasticsearch는 많은 파일을 동시에 열어야 함
      # 65536: 충분한 파일 핸들 확보
      # 기본값(1024)으로는 부족할 수 있음
      nofile:
        soft: 65536  # 권장 최소값
        hard: 65536  # 최대값

    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 5

    networks:
      - oddventure-network

  # Elasticsearch 관리 UI
  kibana:
    image: docker.elastic.co/kibana/kibana:7.10.2
    container_name: oddventure-kibana
    restart: unless-stopped

    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200

    ports:
      - "5601:5601"  # Kibana 웹 UI 포트

    depends_on:
      - elasticsearch

    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:5601/api/status || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 5

    networks:
      - oddventure-network


# 볼륨 정의 (데이터 영속성)
volumes:
  mysql_data:
    driver: local  # 로컬 볼륨 드라이버 사용
  redis_data:
    driver: local # Grafana 데이터 저장소 (대시보드/설정 영속화)
  rabbitmq_data:
    driver: local
  elasticsearch_data:
    driver: local

# 네트워크 정의 (컨테이너 간 통신)
networks:
  oddventure-network:
    driver: bridge  # 브리지 네트워크 드라이버 사용
