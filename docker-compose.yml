# Oddventure 로컬 개발 환경 Docker Compose 설정
# MySQL 8.0과 Redis 8.2.1을 컨테이너로 실행

services:
  # MySQL 데이터베이스 서비스
  mysql:
    image: mysql:8.0  # MySQL 8.0 공식 이미지 사용
    container_name: oddventure-mysql  # 컨테이너 이름 지정
    restart: unless-stopped  # 컨테이너 자동 재시작 (수동으로 중지한 경우 제외)

    # 환경변수 설정 (.env 파일에서 값 로드)
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}  # root 사용자 비밀번호
      MYSQL_DATABASE: ${MYSQL_DATABASE}  # 자동 생성할 데이터베이스 이름
      MYSQL_USER: ${MYSQL_USER}  # 추가 사용자 계정
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}  # 추가 사용자 비밀번호
      TZ: Asia/Seoul  # 타임존 설정
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}

    # 포트 매핑 (호스트:컨테이너)
    ports:
      - "3306:3306"  # MySQL 기본 포트

    # 데이터 영속성을 위한 볼륨 마운트
    volumes:
      - mysql_data:/var/lib/mysql  # MySQL 데이터 디렉토리

    # MySQL 서버 시작 옵션
    command:
      - --character-set-server=utf8mb4  # UTF-8 문자셋 사용
      - --collation-server=utf8mb4_unicode_ci  # 정렬 규칙 설정
      - --skip-name-resolve  # 호스트명 DNS 조회 비활성화 (성능 향상)

    # 헬스체크 설정 (컨테이너 상태 모니터링)
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u${MYSQL_USER}", "-p${MYSQL_PASSWORD}" ]
      interval: 10s  # 10초마다 체크
      timeout: 5s  # 5초 타임아웃
      retries: 5  # 5회 실패 시 unhealthy 상태로 전환

    # 네트워크 설정
    networks:
      - oddventure-network

  # Redis 캐시 서비스
  redis:
    image: redis:8.2.1  # Redis 8.2.1 공식 이미지 사용
    container_name: oddventure-redis  # 컨테이너 이름 지정
    restart: unless-stopped  # 컨테이너 자동 재시작

    # 포트 매핑 (호스트:컨테이너)
    ports:
      - "6379:6379"  # Redis 기본 포트

    # 데이터 영속성을 위한 볼륨 마운트
    volumes:
      - redis_data:/data  # Redis 데이터 디렉토리

    # Redis 서버 시작 옵션 (AOF 영속성 활성화)
    command: redis-server --appendonly yes

    # 헬스체크 설정
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]  # PING 명령으로 응답 확인
      interval: 10s
      timeout: 5s
      retries: 5

    # 네트워크 설정
    networks:
      - oddventure-network

  # RabbitMQ 지연 처리 서비스
  rabbitmq:
    image: rabbitmq:4-management
    container_name: oddventure-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672" # GUI 웹 접속용 포트
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

# 볼륨 정의 (데이터 영속성)
volumes:
  mysql_data:
    driver: local  # 로컬 볼륨 드라이버 사용
  redis_data:
    driver: local # Grafana 데이터 저장소 (대시보드/설정 영속화)
  rabbitmq_data:
    driver: local

# 네트워크 정의 (컨테이너 간 통신)
networks:
  oddventure-network:
    driver: bridge  # 브리지 네트워크 드라이버 사용
