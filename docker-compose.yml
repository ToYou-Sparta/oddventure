# Oddventure 로컬 개발 환경 Docker Compose 설정
# MySQL 8.0과 Redis 8.2.1을 컨테이너로 실행

services:
  # MySQL 데이터베이스 서비스
  mysql:
    image: mysql:8.0  # MySQL 8.0 공식 이미지 사용
    container_name: oddventure-mysql  # 컨테이너 이름 지정
    restart: unless-stopped  # 컨테이너 자동 재시작 (수동으로 중지한 경우 제외)

    # 환경변수 설정 (.env 파일에서 값 로드)
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}  # root 사용자 비밀번호
      MYSQL_DATABASE: ${MYSQL_DATABASE}  # 자동 생성할 데이터베이스 이름
      MYSQL_USER: ${MYSQL_USER}  # 추가 사용자 계정
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}  # 추가 사용자 비밀번호
      TZ: Asia/Seoul  # 타임존 설정

    # 포트 매핑 (호스트:컨테이너)
    ports:
      - "3306:3306"  # MySQL 기본 포트

    # 데이터 영속성을 위한 볼륨 마운트
    volumes:
      - mysql_data:/var/lib/mysql  # MySQL 데이터 디렉토리

    # MySQL 서버 시작 옵션
    command:
      - --character-set-server=utf8mb4  # UTF-8 문자셋 사용
      - --collation-server=utf8mb4_unicode_ci  # 정렬 규칙 설정
      - --skip-name-resolve  # 호스트명 DNS 조회 비활성화 (성능 향상)

    # 헬스체크 설정 (컨테이너 상태 모니터링)
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u${MYSQL_USER}", "-p${MYSQL_PASSWORD}"]
      interval: 10s  # 10초마다 체크
      timeout: 5s  # 5초 타임아웃
      retries: 5  # 5회 실패 시 unhealthy 상태로 전환

    # 네트워크 설정
    networks:
      - oddventure-network

  # Redis 캐시 서비스
  redis:
    image: redis:8.2.1  # Redis 8.2.1 공식 이미지 사용
    container_name: oddventure-redis  # 컨테이너 이름 지정
    restart: unless-stopped  # 컨테이너 자동 재시작

    # 포트 매핑 (호스트:컨테이너)
    ports:
      - "6379:6379"  # Redis 기본 포트

    # 데이터 영속성을 위한 볼륨 마운트
    volumes:
      - redis_data:/data  # Redis 데이터 디렉토리

    # Redis 서버 시작 옵션 (AOF 영속성 활성화)
    command: redis-server --appendonly yes

    # 헬스체크 설정
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]  # PING 명령으로 응답 확인
      interval: 10s
      timeout: 5s
      retries: 5

    # 네트워크 설정
    networks:
      - oddventure-network

  # Prometheus 모니터링 서비스
  prometheus:
    image: prom/prometheus:latest # Prometheus 최신 이미지 사용
    container_name: oddventure-prometheus # Prometheus 컨테이너 이름 설정
    restart: unless-stopped # 컨테이너 자동 재시작
    ports:
      - "9090:9090" # Prometheus 기본 포트
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml # Prometheus 설정 파일
      - prometheus_data:/prometheus # Prometheus 데이터 영속성
    command:
      - '--config.file=/etc/prometheus/prometheus.yml' # 설정 파일 경로
      #- '--storage.tsdb.path=/prometheus' # 메트릭 저장소 기본 경로 (default = data/)
      #- '--storage.tsdb.retention.time=15d' # 데이터 보관 기간 (15일)
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - oddventure-network

  # Grafana 모니터링 서비스
  grafana:
    image: grafana/grafana:latest # Grafana 최신 이미지 사용
    container_name: oddventure-grafana # Grafana 컨테이너 이름 설정
    restart: unless-stopped # 컨테이너 자동 재시작
    ports:
      - "3000:3000" # Grafana 기본 포트
    environment:
      - GF_SECURITY_ADMIN_USER=admin # Grafana 관리자 로그인 ID
      - GF_SECURITY_ADMIN_PASSWORD=admin # Grafana 관리자 로그인 비밀번호
      - TZ=Asia/Seoul # 타임존 설정
    depends_on:
      prometheus:
        condition: service_healthy # Prometheus가 healthy 상태일 때 시작
    volumes:
      - grafana-storage:/var/lib/grafana # Grafana 데이터 디렉토리
      - ./grafana/provisioning:/etc/grafana/provisioning # Datasource 및 Dashboard 자동 프로비저닝
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - oddventure-network

# 볼륨 정의 (데이터 영속성)
volumes:
  mysql_data:
    driver: local  # 로컬 볼륨 드라이버 사용
  redis_data:
    driver: local
  prometheus_data:
    driver: local # Prometheus 메트릭 데이터 영속화
  grafana-storage:
    driver: local # Grafana 데이터 저장소 (대시보드/설정 영속화)

# 네트워크 정의 (컨테이너 간 통신)
networks:
  oddventure-network:
    driver: bridge  # 브리지 네트워크 드라이버 사용
