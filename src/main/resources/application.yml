spring:
  application:
    name: oddventure
  config:
    import: optional:file:.env[.properties]
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        show_sql: true
        format_sql: true
  data:
    redis:
      host: localhost
      port: 6379
  cache:
    type: redis
  ai:
    openai:
      api-key: ${API_KEY}
      base-url: ${BASE_URL}
      chat:
        options:
          model: llama-3.3-70b-versatile
          temperature: 0.0

management:
  server:
    port: 8090
  endpoints:
    web:
      base-path: /api/v1/monitoring
      exposure:
        include: "health,info,metrics,env,prometheus"

jwt:
  secret:
    key: "${SECRET_KEY}"