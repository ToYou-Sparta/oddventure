spring:
  application:
    name: oddventure

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  cache:
    type: redis

  ai:
    openai:
      chat:
        options:
          model: llama-3.3-70b-versatile
          temperature: 0.0

  cloud:
    aws:
      region:
        static: ap-northeast-2
      credentials:
        instance-profile: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
      base-path: /actuator

  prometheus:
    metrics:
      export:
        enabled: true