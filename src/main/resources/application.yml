spring:
  application:
    name: oddventure
  config:
    import: optional:file:.env[.properties]
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        show_sql: true
        format_sql: true
  data:
    redis:
      host: localhost
      port: 6379
  cache:
    type: redis
  ai:
    openai:
      api-key: ${API_KEY}
      base-url: ${BASE_URL}
      chat:
        options:
          model: llama-3.3-70b-versatile
          temperature: 0.0

jwt:
  secret:
    key: "${SECRET_KEY}"

grid:
  central-data:
    base-url: ${GRID_CENTRAL_BASE_URL}
  live-data:
    base-url: ${GRID_LIVE_BASE_URL}
  api-key: ${GRID_API_KEY}