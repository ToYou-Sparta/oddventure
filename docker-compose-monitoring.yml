# Oddventure 모니터링 및 성능 테스트 Docker Compose 설정
# 사용법: docker-compose -f docker-compose.yml -f docker-compose-monitoring.yml up -d

services:
  # Prometheus 모니터링 서비스
  prometheus:
    image: prom/prometheus:latest
    container_name: oddventure-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - oddventure-network

  # Grafana 모니터링 서비스
  grafana:
    image: grafana/grafana:latest
    container_name: oddventure-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - TZ=Asia/Seoul
    depends_on:
      prometheus:
        condition: service_healthy
    volumes:
      - grafana-storage:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - oddventure-network

volumes:
  prometheus_data:
    driver: local
  grafana-storage:
    driver: local

# 네트워크 정의 (컨테이너 간 통신)
networks:
  oddventure-network:
    driver: bridge  # 브리지 네트워크 드라이버 사용