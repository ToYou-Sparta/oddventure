# Prometheus 글로벌 설정
global:
  scrape_interval: 15s # 기본 스크랩 주기 (15초)
  evaluation_interval: 15s # 규칙 평가 주기 (15초)
  scrape_timeout: 10s # 스크랩 타임아웃 (10초)

# 알림 규칙 파일 설정 (선택사항)
# rule_files:
#   - 'alert_rules.yml'

# 스크랩 대상 설정
scrape_configs:
  # Oddventure Spring Boot 애플리케이션
  - job_name: 'oddventure-app'
    metrics_path: '/actuator/prometheus' # Spring Boot Actuator Prometheus 엔드포인트
    scrape_interval: 5s # 앱 메트릭은 더 자주 수집 (5초)
    static_configs:
      - targets: ['host.docker.internal:8080'] # 로컬 개발 환경
        labels:
          instance: 'local'


  # Prometheus 자체 메트릭
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          instance: 'local'

  # MySQL Exporter (선택사항 - MySQL 메트릭 수집)
