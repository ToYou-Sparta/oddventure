name: Deploy REST Docs

on:
  pull_request:
    types: [ "closed" ]
    branches: [ "dev" ]

permissions:
  contents: write

jobs:
  build-and-deploy:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      # 1. 레포 체크아웃
      - name: Checkout
        uses: actions/checkout@v4

      # 2. JDK 설정
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 3. Gradle 권한 설정
      - name: Grant execute permission for Gradle
        run: chmod +x gradlew

      # 4. REST Docs 생성 + 테스트 스킵
      - name: Build REST Docs
        run: ./gradlew clean asciidoctor -x test

      # 5. GitHub Pages로 배포
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/docs/asciidoc
